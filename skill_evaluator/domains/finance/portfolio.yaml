domain: finance
subdomain: portfolio-allocation
version: "1.0.0"
rules:
  - name: mpt-limitations
    description: >
      Modern Portfolio Theory (MPT) guidance must acknowledge its practical
      limitations. MPT assumes investors optimize over mean and variance,
      which may not capture higher moments (skewness, kurtosis) that matter
      to real investors. More critically, practical implementation is highly
      sensitive to estimation error in expected returns and the covariance
      matrix — small input changes produce dramatically different allocations.
    applicability_patterns:
      - "(?i)portfolio.optimization|mean.variance|efficient.frontier|modern.portfolio|markowitz|asset.allocation"
    required_patterns:
      - "(?i)estimation.error|input.sensitivity|robust|shrinkage|Black.Litterman|resampl|limitation|assumption|caveat"
    antipatterns:
      - "(?i)efficient.frontier\\s+(is\\s+)?optimal|mean.variance\\s+(is\\s+)?the.best|markowitz\\s+solves"
    failure_severity: incorrect
    failure_message: >
      Portfolio optimization guidance presents MPT without acknowledging
      estimation error sensitivity. Mean-variance optimizers are notoriously
      sensitive to small changes in expected returns — this is an
      implementation fragility, not a theoretical flaw.
    success_message: >
      Correctly acknowledges MPT limitations and estimation error issues.

  - name: benchmark-selection
    description: >
      Portfolio performance evaluation must use an appropriate benchmark.
      Comparing an equity portfolio to a risk-free rate, or a sector fund
      to the S&P 500, is misleading.
    applicability_patterns:
      - "(?i)benchmark|performance.evaluation|alpha|active.return|track.+error"
    required_patterns:
      - "(?i)appropriate.benchmark|style.match|factor.exposure|benchmark.selection|peer.comparison|investable"
    antipatterns:
      - "(?i)always.compare.to.S.P|S.P.500.is.the.benchmark|one.benchmark.fits.all"
    failure_severity: suspicious
    failure_message: >
      Performance evaluation guidance doesn't discuss appropriate benchmark
      selection. Mismatched benchmarks create misleading alpha estimates.
    success_message: >
      Discusses appropriate benchmark selection for performance evaluation.

  - name: diversification-depth
    description: >
      Diversification guidance must go beyond naive equal-weighting or simple
      stock counting. True diversification requires considering correlation
      structure, factor exposures, concentration risk, and tail dependence.
    applicability_patterns:
      - "(?i)diversif|asset.allocation|portfolio.construction|concentration"
    required_patterns:
      - "(?i)correlation|factor.exposure|sector.exposure|geographic|tail.dependence|concentration.risk|risk.parity"
    antipatterns:
      - "(?i)just.buy.more.stocks|equal.weight.is.optimal|more.stocks.means.more.diversif"
    failure_severity: suspicious
    failure_message: >
      Diversification guidance is superficial. True diversification requires
      understanding correlation structure and factor exposures, not just
      holding more assets.
    success_message: >
      Discusses diversification with appropriate depth including correlations
      and factor exposures.

  - name: rebalancing-methodology
    description: >
      Portfolio management skills must address rebalancing methodology.
      The choice between calendar-based vs. threshold-based rebalancing,
      rebalancing frequency, and the drift-vs-transaction-cost tradeoff
      materially affects performance and risk.
    applicability_patterns:
      - "(?i)portfolio.management|rebalanc|asset.allocation|portfolio.construction|drift"
    required_patterns:
      - "(?i)rebalanc|drift|threshold|calendar|frequency|transaction.cost|tax.aware|bands|tolerance"
    antipatterns:
      - "(?i)never.rebalance|rebalancing.doesn.t.matter|set.and.forget.forever"
    failure_severity: suspicious
    failure_message: >
      Portfolio management guidance does not address rebalancing methodology.
      Without rebalancing, portfolios drift from target allocations, altering
      the risk profile. The rebalancing frequency and method involve real
      tradeoffs between drift risk and transaction/tax costs.
    success_message: >
      Discusses rebalancing methodology and the drift-vs-cost tradeoff.
