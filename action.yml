name: 'Agent Skill Evaluator'
description: 'Evaluate agent SKILL.md files for quality, security, and domain correctness'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to the skill directory or SKILL.md file'
    required: true
    default: '.'
  domain:
    description: 'Force a specific domain (auto-detected if omitted)'
    required: false
    default: ''
  fail-below:
    description: 'Fail the action if the overall score is below this threshold (0-100)'
    required: false
    default: '50'
  format:
    description: 'Output format: terminal, md, json'
    required: false
    default: 'terminal'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  score:
    description: 'Overall skill evaluation score (0-100)'
    value: ${{ steps.evaluate.outputs.score }}
  grade:
    description: 'Overall grade (A+, A, B+, B, C, D, F)'
    value: ${{ steps.evaluate.outputs.grade }}
  report:
    description: 'Full evaluation report (markdown)'
    value: ${{ steps.evaluate.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install agent-skill-evaluator
      shell: bash
      run: |
        pip install git+https://github.com/WilliamWJHuang/agent-skill-evaluator.git

    - name: Run evaluation
      id: evaluate
      shell: bash
      run: |
        # Build command
        CMD="skill-eval '${{ inputs.path }}'"

        # Add domain flag if specified
        if [ -n "${{ inputs.domain }}" ]; then
          CMD="$CMD --domain '${{ inputs.domain }}'"
        fi

        # Run JSON evaluation to capture structured output
        JSON_OUTPUT=$(skill-eval '${{ inputs.path }}' \
          $( [ -n "${{ inputs.domain }}" ] && echo "--domain '${{ inputs.domain }}'" ) \
          --format json 2>/dev/null || echo '{"overall_score": 0, "overall_grade": "F"}')

        # Extract score and grade
        SCORE=$(echo "$JSON_OUTPUT" | python -c "import sys, json; d=json.load(sys.stdin); print(d.get('overall_score', 0))")
        GRADE=$(echo "$JSON_OUTPUT" | python -c "import sys, json; d=json.load(sys.stdin); print(d.get('overall_grade', 'F'))")

        # Set outputs
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT

        # Generate markdown report
        MD_REPORT=$(skill-eval '${{ inputs.path }}' \
          $( [ -n "${{ inputs.domain }}" ] && echo "--domain '${{ inputs.domain }}'" ) \
          --format md 2>/dev/null || echo "Evaluation failed.")

        # Write report to output (multiline)
        {
          echo "report<<SKILL_EVAL_EOF"
          echo "$MD_REPORT"
          echo "SKILL_EVAL_EOF"
        } >> $GITHUB_OUTPUT

        # Write report as step summary
        echo "## 🔍 Agent Skill Evaluation Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$MD_REPORT" >> $GITHUB_STEP_SUMMARY

        # Print terminal output for logs
        echo "::group::Evaluation Details"
        skill-eval '${{ inputs.path }}' \
          $( [ -n "${{ inputs.domain }}" ] && echo "--domain '${{ inputs.domain }}'" ) \
          --format terminal || true
        echo "::endgroup::"

        # Print summary
        echo ""
        echo "📊 Score: $SCORE | Grade: $GRADE"

    - name: Check threshold
      shell: bash
      if: inputs.fail-below != ''
      run: |
        SCORE=${{ steps.evaluate.outputs.score }}
        THRESHOLD=${{ inputs.fail-below }}

        if [ $(echo "$SCORE < $THRESHOLD" | bc -l) -eq 1 ]; then
          echo "::error::❌ Skill score ($SCORE) is below threshold ($THRESHOLD)"
          exit 1
        else
          echo "✅ Skill score ($SCORE) meets threshold ($THRESHOLD)"
        fi
